<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head></head>
<body>
<div layout:fragment="contents">
<section class="SentList">
<h2>People that owe me</h2>
<p id="no_payment_requests_sent" th:if="${#lists.isEmpty(paymentRequestsSent)}">Nobody owes you anything!</p>

<div id="payment_requests_sent" th:unless="${#lists.isEmpty(paymentRequestsSent)}">
<table>
<thead>
<tr>
<th>Who</th>
<th>What</th>
<th>Due In (days)</th>
<th>How Much</th>
</tr>
</thead>
<tbody id="payment_requests_sent" th:unless="${#lists.isEmpty(paymentRequestsSent)}">
<th:block th:each="paymentRequestSent: ${paymentRequestsSent}">
<tr>
<td th:text="${paymentRequestSent.getPersonWhoShouldPayBack.getName}"></td>
<td th:text="${paymentRequestSent.getDescription}"></td>
<td th:text="${paymentRequestSent.daysLeftToPay}"></td>
<td th:text="${paymentRequestSent.getAmountToPay}"></td>
</tr>
</th:block>
</tbody>
<tfoot>
<tr>
<th>Total Unpaid:</th>
<th></th>
<th></th>
<th id="grand_total" th:text="${totalUnpaid}">Total Unpaid</th>
</tr>
</tfoot>
</table>
</div>
</section>
</div>
</body>
</html>
