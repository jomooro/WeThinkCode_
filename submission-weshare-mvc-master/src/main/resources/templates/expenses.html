<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{/layout.html}">
<head></head>
<body>
<div layout:fragment="contents">
<section class="expenseList">
<h2>My Expenses</h2>
<p th:id="no_expenses" th:if="${#lists.isEmpty(no_expenses)}">You don't have any expenses!</p>
<div>
<a id="add_expense" href="/newexpense">Add a new Expense</a>
</div>

<div id="expenses" th:unless="${#lists.isEmpty(expenses)}">
<table>
<tr>
<th>When</th>
<th>What</th>
<th>Amount Spent</th>
<th>Payments Requested</th>
<th>Payments Received</th>
<th>Nett Expense</th>
</tr>
<tr th:each="expense : ${expenses}">
<td th:id="'date_' + ${expense.getId()}" th:text="${expense.getDate()}"></td>
<td>
<a th:id="'payment_request_' + ${expense.getId()}" th:text="${expense.getDescription()}" th:href="@{'/paymentrequest?expenseId=' + ${expense.getId()}}"></a>
</td>
<td th:id="'amount_' + ${expense.getId()}" th:text="${expense.getAmount()}"></td>
<td th:id="'requested_' + ${expense.getId()}" th:text="${expense.totalAmountOfPaymentsRequested()}"></td>
<td th:id="'received_' + ${expense.getId()}" th:text="${expense.totalAmountForPaymentsReceived()}"></td>
<td th:id="'nett_' + ${expense.getId()}" th:text="${expense.getAmount()}"></td>
</tr>
<tfoot>
<tr>
<td>Total Expenses</td>
<td></td>
<td></td>
<td></td>
<td></td>
<td th:id="grand_total" th:text="${total}"></td>
</tr>
</tfoot>
</table>
</div>
</section>
</div>
</body>
</html>
